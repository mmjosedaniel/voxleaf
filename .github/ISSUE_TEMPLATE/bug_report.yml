name: Bug report
description: Report reproducible incorrect behavior
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not include copyrighted book text, generated audio, secrets, or private file paths.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide minimal steps using synthetic or public-domain input.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, CPU, GPU, RAM, application commit or version, and model configuration.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - EPUB import or parsing
        - Reader UI
        - TTS model or service
        - Audio buffering or playback
        - Persistence
        - Packaging or setup
        - Performance
        - Other
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I removed book contents, generated audio, secrets, and private paths.
          required: true
