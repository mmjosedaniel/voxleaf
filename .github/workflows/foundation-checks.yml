name: Foundation checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "agent/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: foundation-${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  windows-native:
    name: Windows native foundation
    runs-on: windows-2025
    timeout-minutes: 45
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          package-manager-cache: false

      - name: Enable pinned pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.15.1 --activate

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: .python-version

      - name: Set up pinned uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: 0.11.29
          enable-cache: true
          cache-dependency-glob: services/tts/uv.lock
          cache-suffix: ${{ runner.os }}-python-3.12.10

      - name: Set up pinned Rust
        run: |
          rustup toolchain install 1.97.1 --profile minimal --component rustfmt,clippy --target x86_64-pc-windows-msvc
          rustup show active-toolchain

      - name: Install locked dependencies
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
        run: |
          pnpm.cmd install --frozen-lockfile
          uv sync --project services/tts --locked

      - name: Install pinned Playwright Chromium
        run: pnpm.cmd test:browser:install

      - name: Run real-browser desktop smoke
        run: pnpm.cmd test:browser

      - name: Run authoritative foundation checks
        run: pnpm.cmd check

      - name: Ensure WebView2 Runtime
        run: |
          $webView2ClientId = "{F3017226-FE2A-4295-8BDF-00C3A9A7E4C5}"
          $webView2RegistryPaths = @(
            "Registry::HKEY_LOCAL_MACHINE\SOFTWARE\WOW6432Node\Microsoft\EdgeUpdate\Clients\$webView2ClientId",
            "Registry::HKEY_CURRENT_USER\Software\Microsoft\EdgeUpdate\Clients\$webView2ClientId"
          )

          function Get-WebView2RuntimeVersion {
            foreach ($registryPath in $webView2RegistryPaths) {
              $runtime = Get-ItemProperty -LiteralPath $registryPath -Name "pv" -ErrorAction SilentlyContinue
              if (
                $null -ne $runtime -and
                -not [string]::IsNullOrWhiteSpace($runtime.pv) -and
                $runtime.pv -ne "0.0.0.0"
              ) {
                return $runtime.pv
              }
            }
            return $null
          }

          $runtimeVersion = Get-WebView2RuntimeVersion
          if ($null -eq $runtimeVersion) {
            $installerPath = Join-Path $env:RUNNER_TEMP "MicrosoftEdgeWebview2Setup.exe"
            Invoke-WebRequest `
              -Uri "https://go.microsoft.com/fwlink/p/?LinkId=2124703" `
              -OutFile $installerPath
            $signature = Get-AuthenticodeSignature -FilePath $installerPath
            if (
              $signature.Status -ne "Valid" -or
              $signature.SignerCertificate.Subject -notlike "*O=Microsoft Corporation*"
            ) {
              throw "WebView2 Runtime installer signature validation failed."
            }
            $installer = Start-Process `
              -FilePath $installerPath `
              -ArgumentList "/silent", "/install" `
              -Wait `
              -PassThru
            if ($installer.ExitCode -ne 0) {
              throw "WebView2 Runtime installation failed with exit code $($installer.ExitCode)."
            }
            $runtimeVersion = Get-WebView2RuntimeVersion
          }

          if ($null -eq $runtimeVersion) {
            throw "WebView2 Runtime is unavailable after installation."
          }
          Write-Output "WebView2 Runtime $runtimeVersion is available."

      - name: Run packaged WebView2 startup smoke
        run: pnpm.cmd test:native-startup

  ubuntu-portable:
    name: Ubuntu portable foundation
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          package-manager-cache: false

      - name: Enable pinned pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.15.1 --activate

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: .python-version

      - name: Set up pinned uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: 0.11.29
          enable-cache: true
          cache-dependency-glob: services/tts/uv.lock
          cache-suffix: ${{ runner.os }}-python-3.12.10

      - name: Install locked dependencies
        run: |
          pnpm install --frozen-lockfile
          uv sync --project services/tts --locked

      - name: Run portable foundation checks
        run: pnpm check:portable
