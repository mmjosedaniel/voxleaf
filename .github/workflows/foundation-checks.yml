name: Foundation checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "agent/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: foundation-${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  windows-native:
    name: Windows native foundation
    runs-on: windows-2025
    timeout-minutes: 45
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          package-manager-cache: false

      - name: Enable pinned pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.15.1 --activate

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: .python-version

      - name: Set up pinned uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: 0.11.29
          enable-cache: true
          cache-dependency-glob: services/tts/uv.lock
          cache-suffix: ${{ runner.os }}-python-3.12.10

      - name: Set up pinned Rust
        run: |
          rustup toolchain install 1.97.1 --profile minimal --component rustfmt,clippy --target x86_64-pc-windows-msvc
          rustup show active-toolchain

      - name: Install locked dependencies
        run: |
          pnpm.cmd install --frozen-lockfile
          uv sync --project services/tts --locked

      - name: Run authoritative foundation checks
        run: pnpm.cmd check

  ubuntu-portable:
    name: Ubuntu portable foundation
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          package-manager-cache: false

      - name: Enable pinned pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.15.1 --activate

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: .python-version

      - name: Set up pinned uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: 0.11.29
          enable-cache: true
          cache-dependency-glob: services/tts/uv.lock
          cache-suffix: ${{ runner.os }}-python-3.12.10

      - name: Install locked dependencies
        run: |
          pnpm install --frozen-lockfile
          uv sync --project services/tts --locked

      - name: Run portable foundation checks
        run: pnpm check:portable
